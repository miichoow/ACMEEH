_comment:
- 'All four built-in challenge types enabled: http-01, dns-01,'
- tls-alpn-01 and dns-persist-01. Each validator has its own tuning
- parameters.
- ''
- ACME clients will see all four in the authorization response
- and can pick whichever they support.
- ''
- 'dns-persist-01 (draft-ietf-acme-dns-persist) is the odd one out: it'
- has no token. The subscriber publishes one long-lived TXT record at
- _validation-persist.<domain> that authorizes future issuance, so
- renewals need no DNS changes. It stays inert until
- issuer_domain_names is set.
server:
  external_url: https://acme.corp.internal
  port: 8443
database:
  database: acmeeh
  user: acmeeh
  password: ${DB_PASSWORD}
ca:
  backend: internal
  internal:
    root_cert_path: /etc/acmeeh/ca/root.pem
    root_key_path: /etc/acmeeh/ca/root-key.pem
challenges:
  enabled:
  - http-01
  - dns-01
  - tls-alpn-01
  - dns-persist-01
  backoff_base_seconds: 5
  backoff_max_seconds: 300
  retry_after_seconds: 3
  http01:
    port: 80
    timeout_seconds: 10
    max_retries: 3
    auto_validate: true
    max_response_bytes: 1048576
  dns01:
    resolvers:
    - 10.0.1.53
    - 10.0.2.53
    timeout_seconds: 30
    propagation_wait_seconds: 15
    max_retries: 5
    auto_validate: false
  tlsalpn01:
    port: 443
    timeout_seconds: 10
    auto_validate: true
  dnspersist01:
    # Required: a published record must name one of these, and clients
    # see them in the challenge's issuer-domain-names field.
    issuer_domain_names:
    - acme.corp.internal
    resolvers:
    - 10.0.1.53
    - 10.0.2.53
    timeout_seconds: 30
    max_retries: 5
    auto_validate: false
    # Honour policy=wildcard for wildcard identifiers.
    allow_wildcard_policy: true
    # Off by default: when on, a policy=wildcard record on example.com
    # also authorizes any name beneath it.
    allow_subdomain_policy: false
logging:
  level: INFO
  format: json
